<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יצירת קאבר לרילים — אתי אטל</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: #f5ede0;
    color: #1a2e1a;
    direction: rtl;
    padding: 24px 16px 60px;
  }
  h1 { font-size: 22px; font-weight: 900; text-align: center; margin-bottom: 6px; }
  .sub { text-align: center; font-size: 14px; color: #555; margin-bottom: 28px; }
  .wrap { max-width: 460px; margin: 0 auto; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  input[type="file"] {
    width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #e8d9c4;
    background: #fff; font-family: 'Heebo', sans-serif;
  }
  textarea {
    width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #e8d9c4;
    font-family: 'Heebo', sans-serif; font-size: 16px; resize: vertical; min-height: 70px;
    direction: rtl; text-align: right;
  }
  input[type="range"] { width: 100%; }
  .range-val { font-size: 12px; color: #777; }
  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .preset-btn {
    background: #e8d9c4; border: none; border-radius: 50px; padding: 7px 14px;
    font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer;
    color: #1a2e1a;
  }
  .preset-btn:hover { background: #ddbf5c; }
  .color-row { display: flex; gap: 12px; }
  .color-row > div { flex: 1; }
  select {
    width: 100%; padding: 10px; border-radius: 10px; border: 2px solid #e8d9c4;
    font-family: 'Heebo', sans-serif; font-size: 14px; background: #fff;
  }
  canvas {
    width: 100%; max-width: 460px; aspect-ratio: 1/1; border-radius: 14px;
    display: block; margin: 0 auto 18px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    background: #ddd;
  }
  .download-btn {
    display: block; width: 100%; background: #1a2e1a; color: #fff;
    border: none; border-radius: 50px; padding: 16px; font-size: 17px; font-weight: 900;
    font-family: 'Heebo', sans-serif; cursor: pointer; margin-top: 8px;
  }
  .download-btn:disabled { background: #aaa; cursor: not-allowed; }
  .download-btn:not(:disabled):hover { background: #3a5c3a; }
  .hint { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
</style>
</head>
<body>

<div class="wrap">
  <h1>יצירת קאבר לריל 🌿</h1>
  <p class="sub">העלי תמונה או סרטון, כתבי טקסט, הורידי PNG מוכן לפיד</p>

  <div class="field">
    <label>1. תמונה או וידאו (נבחרת פריים מתוך הסרטון)</label>
    <input type="file" id="imgInput" accept="image/*,video/*">
  </div>

  <div class="field" id="frameField" style="display:none">
    <label>בחרי פריים מתוך הסרטון: <span class="range-val" id="frameTimeVal">0.0s</span></label>
    <input type="range" id="frameSlider" min="0" max="1" step="0.05" value="0">
  </div>

  <div class="field">
    <label>2. טקסט הקאבר</label>
    <div class="presets">
      <button class="preset-btn" data-text="כוונה טובה שמקבעת הרגלים רעים">פיצה</button>
      <button class="preset-btn" data-text="אמא רק עוד אחד.. בבקשה..">סלוטייפ</button>
      <button class="preset-btn" data-text="הממתק של הטבע ☺️">קלמנטינה</button>
    </div>
    <textarea id="textInput" placeholder="כתבי כאן את הטקסט (אפשר שורה חדשה)">כוונה טובה שמקבעת הרגלים רעים</textarea>
  </div>

  <div class="field">
    <label>3. גודל טקסט: <span class="range-val" id="fontSizeVal">72px</span></label>
    <input type="range" id="fontSize" min="40" max="110" value="72">
  </div>

  <div class="field color-row">
    <div>
      <label>צבע גרדיאנט</label>
      <select id="gradColor">
        <option value="26,46,26">ירוק כהה</option>
        <option value="58,92,58">ירוק בהיר</option>
        <option value="232,217,196">בז' חם</option>
      </select>
    </div>
    <div>
      <label>עוצמת גרדיאנט: <span class="range-val" id="gradStrengthVal">80%</span></label>
      <input type="range" id="gradStrength" min="40" max="95" value="80">
    </div>
  </div>

  <canvas id="canvas" width="1080" height="1080"></canvas>
  <video id="hiddenVideo" muted playsinline preload="auto" style="display:none"></video>

  <button class="download-btn" id="downloadBtn" disabled>הורידי PNG 📥</button>
  <p class="hint">טיפ: כל 3 הקאברים — אותו מיקום טקסט, אותה עוצמת גרדיאנט, לקיר אחיד בפיד</p>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const imgInput = document.getElementById('imgInput');
const textInput = document.getElementById('textInput');
const fontSize = document.getElementById('fontSize');
const fontSizeVal = document.getElementById('fontSizeVal');
const gradColor = document.getElementById('gradColor');
const gradStrength = document.getElementById('gradStrength');
const gradStrengthVal = document.getElementById('gradStrengthVal');
const downloadBtn = document.getElementById('downloadBtn');
const frameField = document.getElementById('frameField');
const frameSlider = document.getElementById('frameSlider');
const frameTimeVal = document.getElementById('frameTimeVal');
const hiddenVideo = document.getElementById('hiddenVideo');

let userImg = null;
let fontReady = false;

document.fonts.load('900 72px Heebo').then(() => {
  fontReady = true;
  draw();
});

function drawPlaceholder() {
  ctx.fillStyle = '#e8d9c4';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#aa9a7c';
  ctx.font = '40px Heebo, sans-serif';
  ctx.textAlign = 'center';
  ctx.direction = 'rtl';
  ctx.fillText('העלי תמונה כדי להתחיל', canvas.width / 2, canvas.height / 2);
}

function draw() {
  if (!userImg) { drawPlaceholder(); return; }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // cover-crop image into square canvas
  const cw = canvas.width, ch = canvas.height;
  const iw = userImg.width, ih = userImg.height;
  const scale = Math.max(cw / iw, ch / ih);
  const sw = cw / scale, sh = ch / scale;
  const sx = (iw - sw) / 2, sy = (ih - sh) / 2;
  ctx.drawImage(userImg, sx, sy, sw, sh, 0, 0, cw, ch);

  // gradient overlay (transparent top -> color bottom)
  const rgb = gradColor.value;
  const strength = gradStrength.value / 100;
  const grad = ctx.createLinearGradient(0, ch * 0.35, 0, ch);
  grad.addColorStop(0, `rgba(${rgb},0)`);
  grad.addColorStop(1, `rgba(${rgb},${strength})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cw, ch);

  // text
  const size = parseInt(fontSize.value, 10);
  const lines = textInput.value.split('\n').filter(l => l.trim().length);
  ctx.direction = 'rtl';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'alphabetic';
  ctx.font = `900 ${size}px Heebo, sans-serif`;
  ctx.lineJoin = 'round';
  ctx.miterLimit = 2;

  const lineHeight = size * 1.25;
  const marginRight = cw * 0.08;
  const marginBottom = ch * 0.09;
  const startY = ch - marginBottom - (lines.length - 1) * lineHeight;

  lines.forEach((line, i) => {
    const y = startY + i * lineHeight;
    ctx.strokeStyle = '#c8a83c';
    ctx.lineWidth = size * 0.045;
    ctx.strokeText(line, cw - marginRight, y);
    ctx.fillStyle = '#FAF6EE';
    ctx.fillText(line, cw - marginRight, y);
  });
}

function captureVideoFrame() {
  const vw = hiddenVideo.videoWidth, vh = hiddenVideo.videoHeight;
  if (!vw || !vh) return;
  const frameCanvas = document.createElement('canvas');
  frameCanvas.width = vw;
  frameCanvas.height = vh;
  frameCanvas.getContext('2d').drawImage(hiddenVideo, 0, 0, vw, vh);
  userImg = frameCanvas;
  downloadBtn.disabled = false;
  draw();
}

imgInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  if (file.type.startsWith('video/')) {
    frameField.style.display = 'block';
    hiddenVideo.src = URL.createObjectURL(file);
    hiddenVideo.addEventListener('loadedmetadata', () => {
      frameSlider.max = hiddenVideo.duration;
      frameSlider.step = Math.min(0.05, hiddenVideo.duration / 100);
      const startAt = Math.min(0.3, hiddenVideo.duration / 2);
      frameSlider.value = startAt;
      frameTimeVal.textContent = startAt.toFixed(1) + 's';
      hiddenVideo.currentTime = startAt;
    }, { once: true });
    hiddenVideo.addEventListener('seeked', captureVideoFrame);
    hiddenVideo.load();
  } else {
    frameField.style.display = 'none';
    const img = new Image();
    img.onload = () => {
      userImg = img;
      downloadBtn.disabled = false;
      draw();
    };
    img.src = URL.createObjectURL(file);
  }
});

frameSlider.addEventListener('input', () => {
  frameTimeVal.textContent = parseFloat(frameSlider.value).toFixed(1) + 's';
  hiddenVideo.currentTime = frameSlider.value;
});

textInput.addEventListener('input', draw);
fontSize.addEventListener('input', () => {
  fontSizeVal.textContent = fontSize.value + 'px';
  draw();
});
gradColor.addEventListener('change', draw);
gradStrength.addEventListener('input', () => {
  gradStrengthVal.textContent = gradStrength.value + '%';
  draw();
});

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    textInput.value = btn.dataset.text;
    draw();
  });
});

downloadBtn.addEventListener('click', () => {
  canvas.toBlob((blob) => {
    const link = document.createElement('a');
    link.download = 'cover.png';
    link.href = URL.createObjectURL(blob);
    link.click();
  }, 'image/png', 1);
});

draw();
</script>

</body>
</html>
